packages:
  - '.'
  - 'docs'

# Supply-chain hardening (pnpm 11)
strictDepBuilds: true
minimumReleaseAge: 10080 # 7 days — most malware is yanked quickly
minimumReleaseAgeStrict: true
trustPolicy: no-downgrade
# Known transitive pins that predate provenance (not takeovers; cannot bump).
trustPolicyExclude:
  - semver@5.7.2
  - semver@6.3.1
blockExoticSubdeps: true
# Committed lockfile is reviewed (CI rejects drive-by lockfile PRs). Age/trust
# checks still apply when resolving new packages outside the lockfile.
trustLockfile: true

# Only these packages may run lifecycle / build scripts
allowBuilds:
  '@parcel/watcher': true
  better-sqlite3: true
  electron: true
  electron-winstaller: true
  esbuild: true
  node-av: true
  sharp: true
  unrs-resolver: true
  vue-demi: true

# Reviewed exceptions to the 7-day release-age gate (pin to exact versions)
minimumReleaseAgeExclude:
  - npm-check-updates@22.2.3
  - '@intlify/core-base@11.4.7'
  - '@intlify/devtools-types@11.4.7'
  - '@intlify/message-compiler@11.4.7'
