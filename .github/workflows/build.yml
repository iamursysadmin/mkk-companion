name: Build

on:
  release:
    types: [published]
  workflow_call:
    inputs:
      tag:
        description: Git tag to attach build artifacts to (e.g. v1.0.0)
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to build and attach artifacts to (e.g. v1.0.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.event.release.tag_name || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Release Files
        run: pnpm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve Version Directory
        id: out
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dir=release/$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: release_on_${{ matrix.os }}
          path: ${{ steps.out.outputs.dir }}
          retention-days: 14
          if-no-files-found: error

      - name: Upload Assets to GitHub Release
        if: ${{ inputs.tag != '' || github.event_name == 'release' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.tag || github.event.release.tag_name }}"
          OUT="${{ steps.out.outputs.dir }}"
          shopt -s nullglob
          files=( "$OUT"/* )
          if [ ${#files[@]} -eq 0 ]; then
            echo "No release files found in $OUT"
            exit 1
          fi
          gh release upload "$TAG" "${files[@]}" --clobber
